name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # The Pages backend intermittently never dequeues a deployment
      # (actions/deploy-pages#406) and the poll timeout is capped at 10
      # minutes, so retry with fresh deployments instead of waiting longer.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: retry_1
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: retry_2
        if: steps.deployment.outcome == 'failure' && steps.retry_1.outcome == 'failure'
        uses: actions/deploy-pages@v4

  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run api:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SPOTIFY_KV_ID: ${{ secrets.SPOTIFY_KV_ID }}
          STEAM_ID: ${{ secrets.STEAM_ID }}
          DISCORD_ID: ${{ secrets.DISCORD_ID }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
